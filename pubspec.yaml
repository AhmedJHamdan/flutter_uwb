name: flutter_uwb
description: Ultra-wideband proximity for Flutter — cm-level distance, real-time ranging, Precision Find.
version: 1.0.0
homepage: https://github.com/AhmedJHamdan/flutter_uwb
repository: https://github.com/AhmedJHamdan/flutter_uwb
issue_tracker: https://github.com/AhmedJHamdan/flutter_uwb/issues
topics:
  - uwb
  - proximity
  - ranging
  - bluetooth
  - location

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.ahmedhamdan.flutter_uwb
        pluginClass: FlutterUwbPlugin
      ios:
        pluginClass: FlutterUwbPlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  pigeon: ^14.0.0
