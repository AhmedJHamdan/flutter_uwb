name: flutter_uwb
description: Cross-OS BLE OOB + UWB ranging (Android Jetpack UWB, iOS Nearby Interaction).
version: 0.2.0+1
homepage: https://github.com/AhmedJHamdan/flutter_uwb
repository: https://github.com/AhmedJHamdan/flutter_uwb
publish_to: https://pub.dev

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.ahmedhamdan.flutter_uwb
        pluginClass: FlutterUwbPlugin
      ios:
        pluginClass: FlutterUwbPlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  pigeon: ^14.0.0
