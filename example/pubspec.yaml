name: flutter_uwb_example
description: "Demonstrates how to use the flutter_uwb plugin."
publish_to: 'none'

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  flutter_uwb:
    path: ../

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "../assets/brand/flutter_uwb_pulse_1024.png"
  min_sdk_android: 23
  remove_alpha_ios: true
  background_color_ios: "#0A0E21"
  adaptive_icon_background: "#0A0E21"
  adaptive_icon_foreground: "../assets/brand/flutter_uwb_pulse_1024.png"

flutter:
  uses-material-design: true
