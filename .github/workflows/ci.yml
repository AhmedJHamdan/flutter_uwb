name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  dart:
    name: Dart analyze + test + pana
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test
      - name: Install pana
        run: dart pub global activate pana
      - name: Run pana
        run: dart pub global run pana --no-warning --exit-code-threshold 20

  android:
    name: Android build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: example
      - name: Gradle unit tests
        run: ./gradlew :flutter_uwb:testDebugUnitTest
        working-directory: example/android
      - name: Build example APK
        run: flutter build apk --debug
        working-directory: example

  ios:
    name: iOS pod lint + example build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: example
      - name: Pod lib lint
        run: pod lib lint ios/flutter_uwb.podspec --allow-warnings
      - name: Build example for iOS simulator
        run: flutter build ios --debug --no-codesign --simulator
        working-directory: example
